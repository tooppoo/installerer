# Repository-level Bun config. The dev-server [serve.static] settings are
# owned by apps/web (apps/web/bunfig.toml); this file only configures
# `bun test` runs from the repository root.

[test]
coverage = true
coverageThreshold = 0.9
coverageReporter = ["text", "lcov"]
coveragePathIgnorePatterns = ["**/test/**/*.ts"]
