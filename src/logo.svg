<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">installerer logo</title>
  <desc id="desc">A rounded square app icon showing a download arrow entering an installation tray, with small terminal brackets suggesting installer script generation.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="56" x2="416" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="accent" x1="154" y1="108" x2="358" y2="404" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg)"/>

  <!-- Subtle generated-artifact frame -->
  <path d="M154 148h204c24.3 0 44 19.7 44 44v160c0 24.3-19.7 44-44 44H154c-24.3 0-44-19.7-44-44V192c0-24.3 19.7-44 44-44Z"
        fill="#E0F2FE" opacity="0.08"/>
  <path d="M154 148h204c24.3 0 44 19.7 44 44v160c0 24.3-19.7 44-44 44H154c-24.3 0-44-19.7-44-44V192c0-24.3 19.7-44 44-44Z"
        fill="none" stroke="#BAE6FD" stroke-width="10" stroke-opacity="0.18"/>

  <!-- Terminal-style brackets: generator / script -->
  <path d="M182 232l-40 40 40 40" fill="none" stroke="#E0F2FE" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <path d="M330 232l40 40-40 40" fill="none" stroke="#E0F2FE" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Install arrow -->
  <g filter="url(#softShadow)">
    <path d="M256 112v154" fill="none" stroke="url(#accent)" stroke-width="40" stroke-linecap="round"/>
    <path d="M204 222l52 52 52-52" fill="none" stroke="url(#accent)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Installation tray / target -->
  <path d="M176 340h160" fill="none" stroke="#E0F2FE" stroke-width="30" stroke-linecap="round"/>
  <path d="M144 326v28c0 31.5 25.5 57 57 57h110c31.5 0 57-25.5 57-57v-28"
        fill="none" stroke="#E0F2FE" stroke-width="24" stroke-linecap="round" opacity="0.92"/>

  <!-- Small release/version dots -->
  <circle cx="172" cy="184" r="10" fill="#7DD3FC" opacity="0.9"/>
  <circle cx="206" cy="184" r="10" fill="#E0F2FE" opacity="0.65"/>
  <circle cx="240" cy="184" r="10" fill="#E0F2FE" opacity="0.38"/>
</svg>
