name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: extractions/setup-just@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: check
        run: just check

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: coverage
          use_oidc: true
          slug: tooppoo/installerer
