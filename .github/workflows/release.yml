name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to receive binary assets.
        required: true
        type: string

permissions:
  contents: write

jobs:
  binary-release:
    name: Binary release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build standalone binaries
        run: bun run build:binary
      - name: Create release assets
        env:
          INSTALLERER_RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: bun run release:binary

      - name: Upload release assets without overwrite
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          gh release view "$RELEASE_TAG"
          gh release upload "$RELEASE_TAG" \
            dist/binary/*.tar.gz \
            dist/binary/checksums.txt \
            dist/binary/VERSION
