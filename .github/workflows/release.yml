name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  binary-release:
    name: Binary release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: tooppoo/rellog-actions/setup@v0.1.0

      - name: check release ready
        run: rellog ready ${{ github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - run: sh scripts/setup-dev.sh

      - name: Build and verify release assets
        env:
          INSTALLERER_RELEASE_TAG: ${{ github.ref_name }}
        run: just binary-release-artifacts

      - name: create release note
        uses: tooppoo/rellog-actions/create-gh-release@v0.1.0
        with:
          release-id: ${{ github.ref_name }}
          files: |
            dist/binary/*
