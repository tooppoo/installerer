name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  binary-release:
    name: Binary release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - run: sh scripts/setup-dev.sh

      - name: Build and verify release assets
        env:
          INSTALLERER_RELEASE_TAG: ${{ github.ref_name }}
        run: just binary-release-artifacts

      - name: Upload release assets without overwrite
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          RELEASE_VERSION="${RELEASE_TAG#v}"
          gh release create "$RELEASE_TAG" \
            "dist/binary/installerer_${RELEASE_VERSION}_Darwin_arm64.tar.gz" \
            "dist/binary/installerer_${RELEASE_VERSION}_Darwin_x86_64.tar.gz" \
            "dist/binary/installerer_${RELEASE_VERSION}_Linux_arm64.tar.gz" \
            "dist/binary/installerer_${RELEASE_VERSION}_Linux_x86_64.tar.gz" \
            dist/binary/checksums.txt \
            dist/binary/VERSION \
            --verify-tag
