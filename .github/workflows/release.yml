name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release-ready:
    name: Release readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify tag matches root package.json version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "release tag ${GITHUB_REF_NAME} does not match package.json version ${pkg_version}" >&2
            exit 1
          fi

      - uses: tooppoo/rellog-actions/setup@0.1.0

      - name: check release ready
        run: rellog ready ${{ github.ref_name }}

  cross-platform-build:
    name: Cross platform build
    needs: release-ready
    uses: tooppoo/github-release-workflows/.github/workflows/wf-cross-platform-build.yml@3ccc9e4ff86db06cfeb3ced53126e4f61f73031d # 0.0.1
    with:
      config_path: .github/release-artifacts.json

  publish:
    name: Publish GitHub release
    needs: cross-platform-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.cross-platform-build.outputs.artifact_name }}
          path: dist/binary

      - name: create release note
        uses: tooppoo/rellog-actions/create-gh-release@0.1.0
        with:
          release-id: ${{ github.ref_name }}
          files: |
            dist/binary/*

  publish-npm:
    name: Publish npm package
    needs: release-ready
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - run: bun install

      - name: Build npm package
        run: bun run build:npm

      - name: Publish npm package
        working-directory: packages/cli/dist/npm
        run: npm publish
