on:
  workflow_call:
    outputs:
      artifact-name:
        value: ${{ jobs.package-npm-tarball.outputs.artifact-name }}

jobs:
  package-npm-tarball:
    name: package npm
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.output-artifact-name.outputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build npm package
        run: bun run build:npm

      - name: Verify npm pack file set
        working-directory: packages/cli/dist/npm
        run: npm pack --dry-run --json | bun run ../../scripts/verifyPackFileSet.ts

      - name: Create npm pack tarball
        working-directory: packages/cli/dist/npm
        run: |
          mkdir -p "$RUNNER_TEMP/npm-package"
          npm pack --pack-destination "$RUNNER_TEMP/npm-package"

      - name: Upload npm package tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package-tarball
          path: ${{ runner.temp }}/npm-package/*.tgz
          if-no-files-found: error

      - name: Output artifact name
        id: output-artifact-name
        run: echo "artifact-name=npm-package-tarball" >> $GITHUB_OUTPUT
